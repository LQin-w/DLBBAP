experiment:
  name: 150-8-no2
  mode: enhanced
  output_root: outputs
  seed: 2026
runtime:
  device: cuda:0
  allow_cpu_fallback: false
  deterministic: false
  channels_last: true
data:
  dataset_root: dataset
  input_size: 384
  local_patch_size: 96
  max_keypoints: 17
  heatmap_sigma_ratio: 0.035
  heatmap_sigma_min: 8.0
  global_crop_mode: bbox
  global_crop_margin_ratio: 0.08
  verify_images: false
  normalization:
    source: auto_train_stats
    stats_path: dataset/train_mean_std.json
    mean: 0.5805843505750644
    std: 0.3230183726796217
    resolved_source: auto_train_stats(cache)
model:
  ensemble_mode: ensemble
  resnet_name: resnet18
  efficientnet_name: efficientnet_b0
  pretrained: false
  branch_mode: global_local
  target_mode: relative
  relative_target_direction: boneage_minus_chronological
  global_dim: 256
  heatmap_guidance:
    enabled: true
  cbam:
    enabled: true
    global_branch: true
    local_branch: true
  metadata:
    enabled: true
    mode: mlp
    hidden_dim: 64
    gender_embedding_dim: 8
    chronological_hidden_dim: 16
    dropout: 0.15
  local_branch:
    mode: patch_heatmap
    feature_dim: 128
    geometry_dim: 64
    dropout: 0.2
  head:
    hidden_dim: 256
    dropout: 0.25
augmentation:
  affine_p: 0.65
  rotation_limit: 10
  translate_limit: 0.04
  scale_limit: 0.1
  shear_limit: 3
  horizontal_flip: false
  horizontal_flip_p: 0.5
  use_noise: false
  noise_std_min: 0.005
  noise_std_max: 0.02
  noise_p: 0.12
  use_blur: false
  blur_limit: 3
  blur_p: 0.08
training:
  epochs: 150
  batch_size: 8
  val_batch_size: 8
  test_batch_size: 8
  optimizer: adamw
  lr: 0.00025
  weight_decay: 0.0005
  momentum: 0.9
  scheduler: cosine
  scheduler_factor: 0.5
  scheduler_patience: 2
  warmup_epochs: 3
  warmup_start_factor: 0.2
  min_lr: 5.0e-06
  loss: smoothl1
  smooth_l1_beta: 0.5
  amp: true
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  compile: true
  compile_mode: reduce-overhead
  best_metric: mae
  resume_checkpoint: null
  progress_bar: true
  log_interval: 25
  eval_interval: 1
  save_interval: 1
  early_stopping_patience: 16
  early_stopping_min_delta: 0.01
  workers_override: 2
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
debug:
  limit_train_samples: 0
  limit_val_samples: 0
  limit_test_samples: 0
optuna:
  direction: minimize
  n_trials: 20
  timeout: null
  epochs_per_trial: 5
