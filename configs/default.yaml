experiment:
  name: rhpe_boneage_multimodal
  output_root: outputs
  seed: 2026

runtime:
  device: cuda:0
  allow_cpu_fallback: false

data:
  dataset_root: dataset
  input_size: 384
  local_patch_size: 96
  max_keypoints: 17
  heatmap_sigma_ratio: 0.035
  global_crop_mode: bbox
  global_crop_margin_ratio: 0.05
  verify_images: true

model:
  ensemble_mode: ensemble
  resnet_name: resnet18
  efficientnet_name: efficientnet_b0
  pretrained: false
  branch_mode: global_local
  target_mode: relative
  relative_target_direction: boneage_minus_chronological
  global_dim: 256
  heatmap_guidance:
    enabled: true
  cbam:
    enabled: true
    global_branch: true
    local_branch: true
  metadata:
    enabled: true
    mode: simba_hybrid
    hidden_dim: 64
    gender_embedding_dim: 8
    chronological_hidden_dim: 16
    dropout: 0.1
  local_branch:
    mode: patch_heatmap
    feature_dim: 128
    geometry_dim: 64
    dropout: 0.15
  head:
    hidden_dim: 256
    dropout: 0.2

augmentation:
  affine_p: 0.7
  rotation_limit: 12
  translate_limit: 0.05
  scale_limit: 0.08
  shear_limit: 4
  horizontal_flip: false
  use_noise: false
  noise_std_min: 0.01
  noise_std_max: 0.03
  noise_p: 0.1
  use_blur: false
  blur_limit: 5
  blur_p: 0.1

training:
  epochs: 30
  batch_size: 8
  val_batch_size: 8
  test_batch_size: 8
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.0001
  momentum: 0.9
  scheduler: plateau
  min_lr: 1.0e-6
  loss: smoothl1
  smooth_l1_beta: 1.0
  amp: true
  gradient_clip: 1.0
  compile: true
  best_metric: mae
  resume_checkpoint: null
  progress_bar: true
  workers_override: null
  prefetch_factor: null
  persistent_workers: null
  pin_memory: null

debug:
  limit_train_samples: 0
  limit_val_samples: 0
  limit_test_samples: 0

optuna:
  direction: minimize
  n_trials: 20
  timeout: null
  epochs_per_trial: 5
